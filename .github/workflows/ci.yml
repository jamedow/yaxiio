name: Yaxiio CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install redis openai
      - name: Run tests
        working-directory: .pi/skills/commander
        run: |
          python3 test_constitution.py
          python3 test_trace_logger.py
          echo "All tests passed"
