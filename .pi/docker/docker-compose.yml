# ─────────────────────────────────────────────────────────────
# LightingMetal Commander — docker-compose 配置
#
# 两种启动模式:
#   方案 A: docker compose up commander        (全能单体镜像)
#   方案 B: docker compose --profile prod up   (分离架构: Redis+Mongo+Commander)
# ─────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ═══════════════════════════════════════════════════════════
  # 方案 A: 全能单体镜像 (开箱即用，适合开发/演示)
  # ═══════════════════════════════════════════════════════════
  commander:
    build:
      context: ../..
      dockerfile: .pi/docker/Dockerfile
    container_name: lightingmetal-commander
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"       # Redis
      - "${MONGO_PORT:-27017}:27017"     # MongoDB
      - "${DASHBOARD_V1_PORT:-3002}:3002" # Dashboard v1
      - "${DASHBOARD_V2_PORT:-3003}:3003" # Dashboard v2 (推荐)
    environment:
      - TZ=Asia/Shanghai
      - REDIS_HOST=127.0.0.1
      - REDIS_PASS=Lt@114514!
      - MONGO_URI=mongodb://127.0.0.1:27017/
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.deepseek.com/v1}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
    volumes:
      - commander-data:/data/db
      - commander-redis:/var/lib/redis
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "Lt@114514!", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT:-4G}
        reservations:
          memory: ${MEMORY_RESERVATION:-1G}
    networks:
      - commander-net

  # ═══════════════════════════════════════════════════════════
  # 方案 B: 分离架构 — Redis 独立服务 (生产推荐)
  # ═══════════════════════════════════════════════════════════
  redis:
    profiles: ["prod"]
    image: redis:7-alpine
    container_name: commander-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASS:-Lt@114514!}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1 --save 300 10
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS:-Lt@114514!}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - commander-net

  # ═══════════════════════════════════════════════════════════
  # 方案 B: 分离架构 — MongoDB 独立服务
  # ═══════════════════════════════════════════════════════════
  mongo:
    profiles: ["prod"]
    image: mongo:7
    container_name: commander-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_DATABASE: lightingmetal
    volumes:
      - mongo-data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - commander-net

  # ═══════════════════════════════════════════════════════════
  # 方案 B: 分离架构 — Commander 纯应用镜像 (不含DB)
  # ═══════════════════════════════════════════════════════════
  commander-app:
    profiles: ["prod"]
    build:
      context: ../..
      dockerfile: .pi/docker/Dockerfile.app
    container_name: commander-app
    restart: unless-stopped
    ports:
      - "${DASHBOARD_V1_PORT:-3002}:3002"
      - "${DASHBOARD_V2_PORT:-3003}:3003"
    environment:
      - TZ=Asia/Shanghai
      - REDIS_HOST=redis
      - REDIS_PASS=${REDIS_PASS:-Lt@114514!}
      - MONGO_URI=mongodb://mongo:27017/
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_BASE_URL=${LLM_BASE_URL:-https://api.deepseek.com/v1}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - commander-net

# ═══════════════════════════════════════════════════════════════
networks:
  commander-net:
    driver: bridge

# ═══════════════════════════════════════════════════════════════
volumes:
  commander-data:
  commander-redis:
  redis-data:
  mongo-data:
